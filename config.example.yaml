# ─────────────────────────────────────────────
#  Music SelfBot — Example Configuration
#  Copy this file to config.yaml and fill in your details.
#  DO NOT commit config.yaml — it contains your tokens.
# ─────────────────────────────────────────────

# Discord user tokens (selfbot accounts)
# Add as many as you need — one bot per token.
tokens:
  - "YOUR_DISCORD_USER_TOKEN_1"
  # - "YOUR_DISCORD_USER_TOKEN_2"
  # - "YOUR_DISCORD_USER_TOKEN_3"

# Command prefix
prefix: "!"

# Lavalink nodes — multi-node failover is built in.
# The bot always picks the least-loaded available node.
lavalink:
  nodes:
    - name: "Node-1"
      host: "lavalink.devamop.in"
      port: 443
      password: "DevamOP"
      secure: true

    - name: "Node-2"
      host: "lavalink.jirayu.net"
      port: 13592
      password: "youshallnotpass"
      secure: false

    - name: "Node-3"
      host: "lavalink.oops.wtf"
      port: 443
      password: "www.freelavalink.ga"
      secure: true

    - name: "Node-4"
      host: "lavalink.techpoint.world"
      port: 443
      password: "techpoint"
      secure: true

# General settings
settings:
  default_volume: 100          # 0-200
  max_queue_size: 500          # max tracks in queue per guild
  auto_disconnect: true        # leave voice when queue empties
  disconnect_timeout: 300      # seconds of inactivity before leaving
